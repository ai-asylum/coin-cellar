<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Coin Cellar — editor</title>
    <style>
      :root {
        --panel-bg: rgba(24, 16, 40, 0.92);
        --panel-edge: #4a3a6a;
        --ink: #ffe9c4;
        --ink-dim: #cdb8ff;
        --accent: #ffcf86;
        --ok: #9be89b;
        --err: #ff9b9b;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #14102a; }
      body { font-family: "Trebuchet MS", system-ui, sans-serif; color: var(--ink); font-size: 13px; }
      #app { position: absolute; inset: 0; }
      #app canvas { display: block; }

      .panel {
        position: absolute; top: 10px; right: 10px; width: 280px;
        max-height: calc(100% - 20px); overflow-y: auto;
        background: var(--panel-bg); border: 1px solid var(--panel-edge);
        border-radius: 10px; padding: 12px; backdrop-filter: blur(4px);
      }
      .panel h2 { margin: 0 0 8px; font-size: 14px; color: var(--accent); }
      .panel h3 { margin: 12px 0 6px; font-size: 12px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.06em; }
      .panel .row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
      .panel label { flex: 0 0 58px; color: var(--ink-dim); }
      .panel input[type="number"], .panel input[type="text"], .panel select {
        flex: 1; min-width: 0; background: #221838; color: var(--ink);
        border: 1px solid var(--panel-edge); border-radius: 6px; padding: 4px 6px; font: inherit;
      }
      .panel input[type="color"] { flex: 1; height: 26px; padding: 0 2px; background: #221838; border: 1px solid var(--panel-edge); border-radius: 6px; }
      .panel button {
        background: #3a2a5a; color: var(--ink); border: 1px solid var(--panel-edge);
        border-radius: 8px; padding: 6px 10px; font: inherit; cursor: pointer; margin: 2px 2px 2px 0;
      }
      .panel button:hover { background: #4a3a72; }
      .panel button.primary { background: #6a4a2a; border-color: #9a6a3a; }
      .panel button.primary:hover { background: #7d5a34; }
      .panel .muted { color: var(--ink-dim); font-size: 12px; margin: 4px 0; }
      .panel .badge { display: inline-block; background: #5a2a2a; border-radius: 6px; padding: 2px 8px; font-size: 11px; margin-left: 6px; }

      #tabs {
        position: absolute; left: 50%; top: 10px; transform: translateX(-50%);
        display: flex; gap: 4px;
        background: var(--panel-bg); border: 1px solid var(--panel-edge);
        border-radius: 10px; padding: 4px;
      }
      #tabs button {
        background: transparent; color: var(--ink-dim); border: 1px solid transparent;
        border-radius: 7px; padding: 5px 16px; font: inherit; cursor: pointer;
      }
      #tabs button:hover { background: #2a1e44; }
      #tabs button.active { background: #4a3a72; color: var(--ink); border-color: var(--panel-edge); }

      #status {
        position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%);
        background: var(--panel-bg); border: 1px solid var(--panel-edge); border-radius: 8px;
        padding: 6px 14px; min-height: 16px; max-width: 70%; text-align: center; pointer-events: none;
      }
      #status.ok { color: var(--ok); }
      #status.error { color: var(--err); }
      #status:empty { display: none; }

      #hint {
        position: absolute; left: 10px; top: 10px; width: 208px;
        background: var(--panel-bg); border: 1px solid var(--panel-edge); border-radius: 10px;
        padding: 10px 12px; font-size: 11.5px; line-height: 1.7; color: var(--ink-dim);
      }
      #hint strong { color: var(--accent); font-size: 12.5px; }
      #hint span { display: block; }
      kbd {
        background: #34264f; border: 1px solid #5a4a7a; border-bottom-width: 2px;
        border-radius: 4px; padding: 0 4px; font-family: inherit; font-size: 10.5px; color: var(--ink);
      }

      #palette {
        position: absolute; left: 50%; bottom: 44px; transform: translateX(-50%);
        width: min(760px, calc(100% - 340px));
        background: var(--panel-bg); border: 1px solid var(--panel-edge); border-radius: 10px;
        padding: 8px;
      }
      #palette[hidden] { display: none; }
      #palette .tabs { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
      #palette .tabs button { background: #2a1e44; color: var(--ink-dim); border: 1px solid var(--panel-edge); border-radius: 6px; padding: 3px 10px; font: inherit; cursor: pointer; }
      #palette .tabs button.active { background: #4a3a72; color: var(--ink); }
      #palette .thumbs { display: flex; gap: 6px; overflow-x: auto; padding: 2px; }
      #palette .thumbs button {
        flex: 0 0 auto; width: 64px; height: 64px; background: #221838;
        border: 1px solid var(--panel-edge); border-radius: 8px; cursor: pointer; padding: 4px;
      }
      #palette .thumbs button:hover { border-color: var(--accent); }
      #palette .thumbs img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: auto; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <nav id="tabs">
      <button id="tab-overworld" class="active">Overworld</button>
      <button id="tab-cave">Cave</button>
      <button id="tab-dungeon">Dungeon</button>
    </nav>
    <aside id="panel" class="panel"></aside>
    <div id="palette" hidden></div>
    <div id="status"></div>
    <div id="hint"></div>
    <script type="module" src="/src/editor/editor.js"></script>
  </body>
</html>
